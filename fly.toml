app = "grab-your-labubu"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "/data/labubu.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "labubu_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 256 # Spek gratisan sudah cukup untuk Go & SQLite