<!DOCTYPE html>
<html>
<head>
    <title>Labubu War Simulator</title>
    <style>
        body { font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; text-align: center; background: #f4f4f4; }
        .container { background: white; width: 350px; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .light { width: 40px; height: 40px; border-radius: 50%; background: #ccc; display: inline-block; margin: 5px; border: 3px solid #333; }
        .red { background: #ff4d4d; box-shadow: 0 0 15px #ff4d4d; }
        .green { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; margin: 10px; transition: 0.2s; }
        #btn-grab { background: #2ecc71; color: white; width: 300px; }
        #btn-grab:disabled { background: #bdc3c7; cursor: not-allowed; }
        #btn-war { background: #e74c3c; color: white; width: 300px; }
        #btn-reset { background: none; color: rgb(34, 37, 41); padding: 0; margin-bottom: 10px; font-size: 16px; }
        #user-result { margin-top: 5px; color: #ff4d4d; font-weight: bold; }
        .log { margin-top: 5px; color: #555; font-weight: bold; }
        .main-image { width: 200px; margin-top: 30px; }
        .display-none { display: none; }
        .cursor-none { cursor: none; }
        .btn-grab-enabled { width: 150px !important; }
        .btn-container-left { display: flex; flex-direction: row; justify-content: space-evenly; }
        .btn-container-right { display: flex; flex-direction: row-reverse; justify-content: space-evenly; }
    </style>
</head>
<body>
    <div class="container">
        <img src="/assets/labubu.png" alt="labubu" class="main-image" id="labubu-image" >
        <h1>Labubu War</h1>
        <div id="lights">
            <div id="l1" class="light"></div>
            <div id="l2" class="light"></div>
            <div id="l3" class="light"></div>
        </div>
        <br>
        <div id="btn-container">
            <button id="btn-grab" class="display-none" disabled>GRAB NOW!</button>
            <button id="btn-war">Start War vs 100 BOTS!</button>
            <button id="btn-reset" class="display-none">🔄 Start Over</button>
        </div>
        <div id="user-result"></div>
        <div class="log" id="status">Ready... 1 2 3 grab!</div>
    </div>

    <script>
        const btnGrab = document.getElementById('btn-grab');
        const btnWar = document.getElementById('btn-war');
        const btnReset = document.getElementById('btn-reset');
        const userResult = document.getElementById('user-result');
        const status = document.getElementById('status');

        // Countdown red lights
        const startRace = () => {
            return new Promise((resolve) => {
                status.innerText = "Standby... Red lights on!";
                btnGrab.disabled = true;
                document.querySelectorAll('.light').forEach(l => l.className = 'light');

                document.getElementById('btn-grab').classList.remove('display-none');
                document.getElementById('btn-war').classList.add('display-none');

                setTimeout(() => document.getElementById('l1').classList.add('red'), 1000);
                setTimeout(() => document.getElementById('l2').classList.add('red'), 2000);
                setTimeout(() => document.getElementById('l3').classList.add('red'), 3000);
                setTimeout(() => {
                    document.getElementById('l1').classList.remove('red');
                    document.getElementById('l2').classList.remove('red');
                    document.getElementById('l3').classList.remove('red');
                    document.getElementById('btn-reset').classList.remove('display-none');
                    document.getElementById('btn-container')
                            .classList.add(Math.random() > 0.5 ? "btn-container-left" : "btn-container-left");

                    btnGrab.disabled = false;
                    btnGrab.classList.add('btn-grab-enabled');
                    document.body.classList.add('cursor-none');
                    resolve();
                }, 3500);
            });
        };

        // User Grab Button Trigger
        btnGrab.onclick = async () => {
            const res = await fetch('/grab');
            const data = await res.json();
            document.body.classList.remove('cursor-none');
            userResult.innerHTML = `<span>${data.message}</span>`;
        };

        // Bot Button Trigger
        btnWar.onclick = async () => {
            status.innerText = "Bots are attacking... 🔥";

            await startRace(); // Wait the lights

            const res = await fetch('/war');    // And then release the bots
            const data = await res.json();

            // Show result
            status.innerHTML = `<br>Podium: <b>${data.podium_winner}</b><br>` +
                                `Remaining stok: <b>${data.remaining}</b>`;
        };

        // Reset Button
        btnReset.onclick = () => {
            const res = fetch('/reset');
            btnGrab.disabled = true;
            btnGrab.classList.remove('btn-grab-enabled');
            document.getElementById('btn-grab').classList.add('display-none');
            document.getElementById('btn-reset').classList.add('display-none');
            document.getElementById('btn-war').classList.remove('display-none');
            document.getElementById('btn-container').className = "";
            document.body.classList.remove('cursor-none');
            userResult.innerHTML = '';
            status.innerHTML = 'Ready... 1 2 3 grab!';
        };
    </script>
</body>
</html>
